<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janete's Cleaners — Your Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBFBm8_E8BW2yPOLSmTCuD93Yiy3I5_XcY",
  authDomain: "janete-s-cleaners.firebaseapp.com",
  databaseURL: "https://janete-s-cleaners-default-rtdb.firebaseio.com",
  projectId: "janete-s-cleaners",
  storageBucket: "janete-s-cleaners.firebasestorage.app",
  messagingSenderId: "1050742171260",
  appId: "1:1050742171260:web:2aab521d37166d2b614bf9"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const JANETE_PHONE = "2079310000"; // ← UPDATE with real number
const JANETE_EMAIL = "janete@janetescleaners.com"; // ← UPDATE with real email

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtPhone(p){ const d=(p||'').replace(/\D/g,''); return d.length===10?`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`:p||''; }
function getParam(key){ return new URLSearchParams(window.location.search).get(key); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

let clientData = null;
let clientBookings = [];
let clientSkips = [];

function init() {
  const clientName = getParam('client');

  if (!clientName) {
    renderError('No account found', 'This link doesn\'t include your name. Please use the link Janete sent you.');
    return;
  }

  document.title = `${clientName} — Janete's Cleaners`;

  // Update greeting
  const first = clientName.split(' ')[0];
  document.getElementById('greeting').innerHTML = `Welcome, <strong>${esc(first)}</strong>`;
  document.getElementById('client-sub').textContent = clientName + ' · Your cleaning account';

  // Live listener for this client's record
  const clientQ = query(collection(db, 'clients'), where('name', '==', clientName));
  onSnapshot(clientQ, snap => {
    if (snap.empty) {
      renderError('Account not found', `We don't have a record for "${esc(clientName)}". Please contact Janete to be added.`);
      return;
    }
    clientData = snap.docs[0].data();
    renderAll(clientName);
  });

  // Live listener for bookings
  const bookingQ = query(collection(db, 'bookings'), where('clientName', '==', clientName), orderBy('date'));
  onSnapshot(bookingQ, snap => {
    clientBookings = snap.docs.map(d => d.data());
    renderAppointments();
  });

  // Live listener for skips
  const skipQ = query(collection(db, 'skips'), where('clientName', '==', clientName), orderBy('date'));
  onSnapshot(skipQ, snap => {
    clientSkips = snap.docs.map(d => d.data());
    renderSkips();
  });
}

function renderAll(clientName) {
  renderAppointments();
  renderSkips();
  renderPolicy();
  renderContact(clientName);
}

function renderError(title, msg) {
  document.getElementById('greeting').textContent = 'Something went wrong';
  document.getElementById('client-sub').textContent = '';
  document.getElementById('portal-body').innerHTML = `
    <div class="not-found">
      <div class="nf-icon">🔍</div>
      <h2>${esc(title)}</h2>
      <p>${esc(msg)}</p>
    </div>`;
}

function renderAppointments() {
  const container = document.getElementById('section-appointments');
  if (!container) return;
  const now = new Date();
  const upcoming = clientBookings
    .filter(b => new Date(b.date + 'T23:59:00') >= now)
    .sort((a,b) => a.date.localeCompare(b.date));

  let inner = '';
  if (!upcoming.length) {
    inner = `<div class="no-appts"><strong>No upcoming appointments</strong>Contact Janete below to book your next cleaning.</div>`;
  } else {
    inner = upcoming.map(b => {
      const dt = new Date(b.date + 'T12:00:00');
      return `<div class="appt-item">
        <div class="appt-date-col">
          <div class="day-num">${dt.getDate()}</div>
          <div class="day-mon">${MONTHS[dt.getMonth()].slice(0,3).toUpperCase()}</div>
          <div class="day-yr">${dt.getFullYear()}</div>
        </div>
        <div class="appt-info">
          <div class="appt-service">${esc(b.service)}</div>
          <div class="appt-time">🕐 ${esc(b.time)}</div>
          ${clientData && clientData.address ? `<div class="appt-addr">📍 ${esc(clientData.address)}</div>` : ''}
        </div>
        <span class="appt-badge">Confirmed</span>
      </div>`;
    }).join('');
  }
  container.innerHTML = `
    <div class="section-label">Upcoming Appointments</div>
    <div class="card animate">${inner}</div>`;
}

function renderSkips() {
  const container = document.getElementById('section-skips');
  if (!container) return;
  const noticeLabels = { none:'No notice given','same-day':'Same-day cancellation','under-24':'Less than 24hr notice','over-24':'More than 24hr notice' };
  const unpaidTotal = clientSkips.filter(s=>s.feeStatus==='unpaid').length * 50;
  const badge = unpaidTotal > 0 ? `<span class="fee-badge-inline">$${unpaidTotal} outstanding</span>` : '';

  let inner = '';
  if (!clientSkips.length) {
    inner = `<div class="skip-clean">✅ No skips or cancellations on record.</div>`;
  } else {
    inner = clientSkips.map(s => {
      const icon = s.feeStatus==='paid'?'✅':s.feeStatus==='unpaid'?'⚠️':'📋';
      const cls  = s.feeStatus==='paid'?'paid':s.feeStatus==='unpaid'?'unpaid':'na';
      const feeLabel = s.fee>0
        ? `<span class="skip-fee-badge ${cls}">${s.feeStatus==='paid'?'Paid $50':'$50 Owed'}</span>`
        : `<span class="skip-fee-badge na">No fee</span>`;
      return `<div class="skip-item">
        <div class="skip-icon ${cls}">${icon}</div>
        <div class="skip-details">
          <div class="skip-date">${esc(s.date)}</div>
          <div class="skip-notice">${noticeLabels[s.notice]||s.notice}</div>
        </div>
        ${feeLabel}
      </div>`;
    }).join('');
  }
  container.innerHTML = `
    <div class="section-label">Skip & Fee History ${badge}</div>
    <div class="card animate">${inner}</div>`;
}

function renderPolicy() {
  const container = document.getElementById('section-policy');
  if (!container) return;
  container.innerHTML = `
    <div class="section-label">Cancellation Policy</div>
    <div class="policy-card animate">
      <div class="policy-title">24-Hour Notice Required</div>
      <div class="policy-text">
        Cancellations or reschedules must be made with at least <strong>24 hours notice</strong>.<br><br>
        Cancellations with less than 24 hours notice — including same-day and no-shows — are subject to a <strong>$50 cancellation fee</strong>.
      </div>
      <span class="policy-pill">$50 fee · Under 24hr notice</span>
    </div>`;
}

function renderContact(clientName) {
  const container = document.getElementById('section-contact');
  if (!container) return;
  const phone = clientData ? (clientData.phone||'').replace(/\D/g,'') : '';
  const email = clientData ? (clientData.email||'') : '';
  const phoneFmt = JANETE_PHONE.length===10 ? `(${JANETE_PHONE.slice(0,3)}) ${JANETE_PHONE.slice(3,6)}-${JANETE_PHONE.slice(6)}` : JANETE_PHONE;

  container.innerHTML = `
    <div class="section-label">Contact Janete</div>
    <div class="contact-card animate">
      <div class="contact-header">
        <div class="contact-header-icon">✉</div>
        <div>
          <div class="contact-header-text">Send a Message</div>
          <div class="contact-header-sub">Questions, reschedules, or special requests</div>
        </div>
      </div>
      <div class="contact-body">
        <div class="field-group">
          <label class="field-label">Topic</label>
          <select class="field-input" id="contact-topic">
            <option>General question</option>
            <option>Reschedule an appointment</option>
            <option>Cancel an appointment</option>
            <option>Request a new appointment</option>
            <option>Question about a fee</option>
            <option>Special instructions</option>
            <option>Other</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Your Message</label>
          <textarea class="field-input" id="contact-msg" placeholder="Hi Janete, I wanted to reach out about…"></textarea>
        </div>
        <div class="send-row">
          <a class="btn-send-sms" href="sms:+1${JANETE_PHONE}" id="sms-btn">💬 Text Janete</a>
          <a class="btn-send-email" href="mailto:${JANETE_EMAIL}" id="email-btn">✉ Email Janete</a>
        </div>
        <div class="direct-line">Or call: <a href="tel:+1${JANETE_PHONE}" style="color:var(--ink);font-weight:600">${phoneFmt}</a></div>
      </div>
    </div>`;

  // Wire up send buttons with message content
  document.getElementById('sms-btn').addEventListener('click', e => {
    e.preventDefault();
    const topic = document.getElementById('contact-topic').value;
    const msg = document.getElementById('contact-msg').value.trim();
    const body = `Hi Janete, this is ${clientName}.\n\nTopic: ${topic}\n\n${msg||'(no message)'}`;
    window.location.href = `sms:+1${JANETE_PHONE}?body=${encodeURIComponent(body)}`;
  });
  document.getElementById('email-btn').addEventListener('click', e => {
    e.preventDefault();
    const topic = document.getElementById('contact-topic').value;
    const msg = document.getElementById('contact-msg').value.trim();
    const body = `Hi Janete, this is ${clientName}.\n\nTopic: ${topic}\n\n${msg||'(no message)'}`;
    window.location.href = `mailto:${JANETE_EMAIL}?subject=${encodeURIComponent('Client Message: '+topic+' — '+clientName)}&body=${encodeURIComponent(body)}`;
  });
}

// Init on load
window.addEventListener('DOMContentLoaded', init);
</script>
<style>
  :root {
    --red: #C41A1A; --red-dark: #9E1515;
    --ink: #1A1A1A; --ink-soft: #555;
    --cream: #FAF8F4; --cream-dark: #F0EDE6;
    --border: #E2DDD6; --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .site-header { background: var(--ink); position: relative; overflow: hidden; }
  .site-header::before { content:''; position:absolute; top:-60px; right:-60px; width:220px; height:220px; border-radius:50%; background:var(--red); opacity:0.15; }
  .header-inner { max-width: 600px; margin: 0 auto; padding: 32px 24px 28px; position: relative; z-index: 1; }
  .brand-tag { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 6px; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; color: #FAF8F4; }
  .brand-name span { color: var(--red); }
  .header-divider { width: 36px; height: 2px; background: var(--red); margin: 12px 0; }
  #greeting { font-size: 20px; font-family: 'Playfair Display', serif; color: #FAF8F4; }
  #greeting strong { color: #FAF8F4; }
  #client-sub { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 4px; }

  /* LIVE INDICATOR */
  .live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 10px; }
  .live-dot::before { content:''; width:7px; height:7px; border-radius:50%; background:#4CAF50; display:inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  .main { max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--red); margin-bottom: 10px; margin-top: 28px; display: flex; align-items: center; gap: 8px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .fee-badge-inline { font-size: 10px; background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

  .card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .animate { animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px);} to{opacity:1;transform:translateY(0);} }

  .appt-item { display: flex; align-items: stretch; border-bottom: 1px solid var(--cream-dark); }
  .appt-item:last-child { border-bottom: none; }
  .appt-date-col { background: var(--ink); min-width: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px 10px; gap: 2px; }
  .day-num { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700; line-height: 1; color: white; }
  .day-mon { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.5); }
  .day-yr { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 2px; }
  .appt-info { flex: 1; padding: 14px 16px; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
  .appt-service { font-weight: 600; font-size: 14px; }
  .appt-time { font-size: 12px; color: var(--ink-soft); }
  .appt-addr { font-size: 11px; color: #999; margin-top: 2px; }
  .appt-badge { align-self: center; margin-right: 14px; font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; white-space: nowrap; }
  .no-appts { padding: 28px 20px; text-align: center; color: #999; font-size: 13px; line-height: 1.7; }
  .no-appts strong { display: block; font-size: 15px; color: var(--ink-soft); margin-bottom: 4px; }

  .skip-item { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid var(--cream-dark); }
  .skip-item:last-child { border-bottom: none; }
  .skip-icon { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .skip-icon.unpaid { background: #FFF3F3; } .skip-icon.paid { background: #F0FFF4; } .skip-icon.na { background: #F5F5F5; }
  .skip-details { flex: 1; }
  .skip-date { font-size: 13px; font-weight: 500; }
  .skip-notice { font-size: 11px; color: #999; margin-top: 2px; }
  .skip-fee-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; white-space: nowrap; }
  .skip-fee-badge.unpaid { background: #FCEBEB; color: #A32D2D; border: 1px solid #F7C1C1; }
  .skip-fee-badge.paid   { background: #E8F5E9; color: #2E7D32; border: 1px solid #C8E6C9; }
  .skip-fee-badge.na     { background: #F5F5F5; color: #999; border: 1px solid #E5E5E5; }
  .skip-clean { padding: 20px; text-align: center; font-size: 13px; color: #999; }

  .policy-card { background: var(--ink); border-radius: 14px; padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .policy-card::before { content:'⚠'; position:absolute; right:16px; top:16px; font-size:32px; opacity:0.07; }
  .policy-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: #FAF8F4; margin-bottom: 8px; }
  .policy-text { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.7; }
  .policy-text strong { color: var(--red); }
  .policy-pill { display: inline-block; margin-top: 12px; background: var(--red); color: white; font-size: 11px; font-weight: 600; padding: 5px 14px; border-radius: 20px; }

  .contact-card { background: var(--white); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 12px; }
  .contact-header { background: var(--cream-dark); padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .contact-header-icon { width: 32px; height: 32px; background: var(--ink); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: white; }
  .contact-header-text { font-size: 13px; font-weight: 600; }
  .contact-header-sub { font-size: 11px; color: #999; margin-top: 1px; }
  .contact-body { padding: 18px; }
  .field-group { margin-bottom: 13px; }
  .field-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #999; margin-bottom: 5px; }
  .field-input { width: 100%; border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 13px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--ink); background: var(--cream); outline: none; transition: border-color 0.15s; }
  .field-input:focus { border-color: var(--ink); background: var(--white); }
  textarea.field-input { resize: vertical; min-height: 90px; }
  .send-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .btn-send-sms { flex:1; padding:11px; background:var(--ink); color:#FAF8F4; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; text-decoration:none; transition:background 0.15s; }
  .btn-send-sms:hover { background:#2C2C2C; }
  .btn-send-email { flex:1; padding:11px; background:var(--red); color:white; border:none; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; text-decoration:none; transition:background 0.15s; }
  .btn-send-email:hover { background:var(--red-dark); }
  .direct-line { font-size: 12px; color: #999; }

  .not-found { text-align: center; padding: 60px 24px; animation: fadeUp 0.4s ease both; }
  .nf-icon { font-size: 48px; margin-bottom: 16px; }
  .not-found h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 8px; }
  .not-found p { font-size: 14px; color: #999; line-height: 1.6; max-width: 320px; margin: 0 auto; }

  .loading { text-align: center; padding: 60px 24px; color: #999; font-size: 14px; }
  .loading .spinner { width: 32px; height: 32px; border: 3px solid #E5E5E5; border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .site-footer { text-align: center; padding: 24px 16px; font-size: 11px; color: #bbb; border-top: 1px solid var(--border); }
  .site-footer strong { color: #999; }

  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#FAF8F4; padding:11px 20px; border-radius:30px; font-size:13px; font-weight:500; opacity:0; transition:all 0.25s; pointer-events:none; z-index:200; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="site-header">
  <div class="header-inner">
    <div class="brand-tag">Client Portal</div>
    <div class="brand-name">Janete's<span> Cleaners</span></div>
    <div class="header-divider"></div>
    <div id="greeting">Loading…</div>
    <div id="client-sub"></div>
    <div class="live-dot">Live — updates instantly</div>
  </div>
</div>

<div class="main" id="portal-body">
  <div class="loading">
    <div class="spinner"></div>
    Loading your account…
  </div>

  <div id="section-appointments"></div>
  <div id="section-skips"></div>
  <div id="section-policy"></div>
  <div id="section-contact"></div>
</div>

<footer class="site-footer">
  &copy; <strong>Janete's Cleaners Inc.</strong> · Sanford, Maine
</footer>

<div class="toast" id="toast"></div>
</body>
</html>
