window.loadClients = async function() {
  const btn = document.getElementById('load-btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  log.style.display = 'block';
  log.innerHTML = '';

  // Get existing client names to avoid duplicates
  const existing = await getDocs(collection(db, 'clients'));
  const existingNames = existing.docs.map(d => (d.data().name || '').toLowerCase());

  let loaded = 0, skipped = 0;
  for (const c of clients) {
    if (existingNames.includes(c.name.toLowerCase())) {
      log.innerHTML += `<div class="log-item">⏭ Skipped (exists): ${c.name}</div>`;
      skipped++;
    } else {
      try {
        await addDoc(collection(db, 'clients'), { ...c, createdAt: new Date().toISOString() });
        log.innerHTML += `<div class="log-item ok">✅ Loaded: ${c.name}</div>`;
        loaded++;
      } catch(e) {
        log.innerHTML += `<div class="log-item err">❌ Error: ${c.name} — ${e.message}</div>`;
      }
    }
    log.scrollTop = log.scrollHeight;
    await new Promise(r => setTimeout(r, 100));
  }

  log.innerHTML += `<div class="log-item ok" style="margin-top:8px;font-size:0.9rem;font-weight:700">Done! Loaded: ${loaded} | Skipped: ${skipped}</div>`;
  document.getElementById('done-msg').style.display = 'block';
  btn.textContent = '✅ Clients Loaded!';
};
