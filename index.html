<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janete's Cleaners — Management Suite</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    /* STYLES FROM ORIGINAL VERSION */
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F5F3EE;color:#1C1C1E;min-height:100vh;font-size:14px}
    .topbar{background:#C41A1A;color:#fff;display:flex;align-items:stretch;border-radius:0 0 10px 10px;overflow:hidden}
    .topbar-brand{background:#1C1C1E;padding:14px 22px;display:flex;flex-direction:column;justify-content:center;min-width:190px}
    .topbar-brand .bname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#FAF7F2;line-height:1}
    .topbar-alert{flex:1;display:flex;align-items:center;padding:12px 20px;gap:10px}
    .topbar-alert .atitle{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1.5px;line-height:1}
    .nav{display:flex;padding:0 16px;background:#fff;border-bottom:1px solid #E5E5E5}
    .nav-tab{padding:10px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#666;transition:all 0.15s}
    .nav-tab.active{color:#C41A1A;border-bottom-color:#C41A1A}
    .page{display:none;padding:16px}
    .page.active{display:block}
    .grid-2{display:grid;grid-template-columns:1fr 300px;gap:16px}
    .card{background:#fff;border:1px solid #E5E5E5;border-radius:10px;overflow:hidden}
    .card-head{padding:11px 16px;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;justify-content:space-between}
    .ctitle{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1.2px}
    .search-row{padding:10px 16px;border-bottom:1px solid #E5E5E5}
    .search-row input{width:100%;border:1px solid #DDD;border-radius:6px;padding:7px 11px;font-size:13px;background:#F9F9F7;outline:none}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead th{padding:8px 10px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;background:#F9F9F7;border-bottom:1px solid #E5E5E5}
    tbody td{padding:10px;border-bottom:1px solid #F0F0F0;vertical-align:middle}
    .act-cell{display:flex;gap:4px}
    .btn-xs{padding:4px 8px;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
    .btn-rem{background:#FFF3CD;color:#7A5200}
    .btn-bill{background:#D1E7DD;color:#0A3622}
    .btn-skip{background:#FCEBEB;color:#A32D2D}
    .finput{width:100%;border:1px solid #DDD;border-radius:6px;padding:8px 11px;font-size:13px;background:#F9F9F7;margin-bottom:10px;outline:none}
    .btn-main{width:100%;padding:10px;background:#1C1C1E;color:#FAF7F2;border:none;border-radius:7px;font-family:'Bebas Neue',sans-serif;font-size:15px;cursor:pointer}
    .btn-main:hover{background:#C41A1A}
    
    /* LOGIN OVERLAY */
    #login-screen { position: fixed; inset: 0; background: #1C1C1E; color: white; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
    .login-card { background: white; padding: 30px; border-radius: 12px; width: 350px; color: #1C1C1E; text-align: center;}
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="font-family:'Bebas Neue'; font-size: 28px; margin-bottom: 20px;">Staff Login</h2>
    <input type="email" id="login-email" placeholder="Email" class="finput">
    <input type="password" id="login-pass" placeholder="Password" class="finput">
    <button class="btn-main" onclick="handleLogin()">Unlock Suite</button>
    <p id="login-error" style="color:red; font-size:11px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app" class="hidden">
    <div class="topbar">
      <div class="topbar-brand"><div class="bname">Janete's Cleaners</div></div>
      <div class="topbar-alert"><div class="atitle">Skip Policy Active</div></div>
    </div>

    <div class="nav">
      <div class="nav-tab active">Dashboard</div>
    </div>

    <main class="page active">
      <div class="grid-2">
        <div class="card">
          <div class="card-head"><span class="ctitle">Client Directory</span><span id="client-count"></span></div>
          <div class="search-row"><input type="text" id="searchInput" placeholder="Search..." oninput="renderTable()"></div>
          <table>
            <thead><tr><th>Name</th><th>Contact</th><th>Actions</th></tr></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        
        <div class="card">
          <div class="card-head"><span class="ctitle">Add / Edit</span></div>
          <div class="card-body" style="padding:16px">
            <input type="hidden" id="editKey">
            <input class="finput" id="f-name" placeholder="Full Name">
            <input class="finput" id="f-phone" placeholder="Phone Number">
            <input class="finput" id="f-email" placeholder="Email Address">
            <textarea class="finput" id="f-address" placeholder="Service Address" style="height:60px"></textarea>
            <button class="btn-main" onclick="submitForm()">Save to Cloud</button>
            <button class="btn-main" onclick="auth.signOut()" style="background:#888; margin-top:10px;">Log Out</button>
          </div>
        </div>
      </div>
    </main>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBFBm8_E8BW2yPOLSmTCuD93Yiy3I5_XcY",
  authDomain: "janete-s-cleaners.firebaseapp.com",
  databaseURL: "https://janete-s-cleaners-default-rtdb.firebaseio.com",
  projectId: "janete-s-cleaners",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let clients = {};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    db.ref("clients").on('value', snap => {
      clients = snap.val() || {};
      renderTable();
    });
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('main-app').classList.add('hidden');
  }
});

function handleLogin() {
  auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value)
    .catch(e => document.getElementById('login-error').textContent = e.message);
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tb = document.getElementById('tableBody');
  const keys = Object.keys(clients).filter(k => clients[k].name.toLowerCase().includes(q));
  
  tb.innerHTML = keys.map(k => {
    const c = clients[k];
    const contactMethod = c.phone ? `📞 ${c.phone}` : (c.email ? `✉️ ${c.email}` : 'No contact info');
    return `
      <tr>
        <td><strong>${c.name}</strong></td>
        <td style="font-size:11px; color:#666">${contactMethod}</td>
        <td class="act-cell">
          <button class="btn-xs btn-rem" onclick="editClient('${k}')">✏️ Edit</button>
          <button class="btn-xs btn-bill" onclick="billClient('${k}')">💵 Bill</button>
          <button class="btn-xs btn-skip" onclick="deleteClient('${k}')">🗑</button>
        </td>
      </tr>
    `}).join('');
}

function submitForm() {
  const key = document.getElementById('editKey').value;
  const data = {
    name: document.getElementById('f-name').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    address: document.getElementById('f-address').value
  };
  if(key) db.ref('clients/'+key).update(data); else db.ref('clients').push(data);
  ['editKey','f-name','f-phone','f-email','f-address'].forEach(id => document.getElementById(id).value="");
}

function editClient(k) {
  document.getElementById('editKey').value = k;
  document.getElementById('f-name').value = clients[k].name;
  document.getElementById('f-phone').value = clients[k].phone || '';
  document.getElementById('f-email').value = clients[k].email || '';
  document.getElementById('f-address').value = clients[k].address || '';
}

function deleteClient(k) { if(confirm("Delete client?")) db.ref('clients/'+k).remove(); }

function billClient(k) {
  const c = clients[k];
  const html = `<html><body style="font-family:sans-serif; padding:40px;">
    <h1>INVOICE</h1><p>Client: ${c.name}</p><p>Address: ${c.address}</p>
    <hr><p>Service: Cleaning</p><p>Total: $____</p>
    <button onclick="window.print()">Print Invoice</button>
  </body></html>`;
  const win = window.open('','_blank');
  win.document.write(html);
}
</script>
</body>
</html>
</body>
</html>
