<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janete's Cleaners — Master Suite</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#F5F3EE;color:#1C1C1E;min-height:100vh;font-size:14px}
    .topbar{background:#C41A1A;color:#fff;display:flex;align-items:stretch;border-radius:0 0 10px 10px;overflow:hidden}
    .topbar-brand{background:#1C1C1E;padding:14px 22px;display:flex;flex-direction:column;justify-content:center;min-width:190px}
    .topbar-brand .bname{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:#FAF7F2;line-height:1}
    .nav{display:flex;padding:0 16px;background:#fff;border-bottom:1px solid #E5E5E5;overflow-x:auto}
    .nav-tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;color:#666;white-space:nowrap}
    .nav-tab.active{color:#C41A1A;border-bottom-color:#C41A1A}
    .page{display:none;padding:16px}
    .page.active{display:block}
    .grid-2{display:grid;grid-template-columns:1fr 320px;gap:16px}
    @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }
    .card{background:#fff;border:1px solid #E5E5E5;border-radius:10px;overflow:hidden;margin-bottom:16px}
    .card-head{padding:11px 16px;border-bottom:1px solid #E5E5E5;display:flex;align-items:center;justify-content:space-between;background:#FCFBFA}
    .ctitle{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:1px}
    table{width:100%;border-collapse:collapse;font-size:12px}
    thead th{padding:10px;text-align:left;font-size:10px;text-transform:uppercase;color:#888;background:#F9F9F7;border-bottom:1px solid #E5E5E5}
    tbody td{padding:12px 10px;border-bottom:1px solid #F0F0F0}
    .status-pill{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:700;cursor:pointer;text-transform:uppercase}
    .status-paid{background:#D1E7DD;color:#0A3622}
    .status-pending{background:#F8D7DA;color:#842029}
    .btn-xs{padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;margin-right:4px;text-decoration:none;display:inline-block;font-family:inherit}
    .btn-rem{background:#FFF3CD;color:#7A5200}
    .btn-bill{background:#1C1C1E;color:#fff}
    .btn-skip{background:#FCEBEB;color:#A32D2D}
    .finput{width:100%;border:1px solid #DDD;border-radius:6px;padding:10px;font-size:13px;background:#F9F9F7;margin-bottom:12px;outline:none;font-family:inherit}
    .btn-main{width:100%;padding:12px;background:#C41A1A;color:#fff;border:none;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;cursor:pointer}
    .chat-bubble{display:inline-flex;align-items:center;background:#25D366;color:white;padding:12px 25px;border-radius:30px;text-decoration:none;font-weight:600;gap:10px;margin-top:15px;font-size:16px}
    #login-screen { position: fixed; inset: 0; background: #1C1C1E; color: white; display: flex; align-items: center; justify-content: center; z-index: 1000; flex-direction: column; }
    .login-card { background: white; padding: 40px; border-radius: 16px; width: 90%; max-width: 380px; color: #1C1C1E; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);}
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <h2 style="font-family:'Bebas Neue'; font-size: 32px; margin-bottom: 20px;">Staff Login</h2>
    <input type="email" id="login-email" placeholder="Email Address" class="finput">
    <input type="password" id="login-pass" placeholder="Password" class="finput">
    <button class="btn-main" onclick="handleLogin()">Unlock System</button>
    <p id="login-error" style="color:red; font-size:11px; margin-top:10px;"></p>
  </div>
</div>

<div id="main-app" class="hidden">
    <div class="topbar">
      <div class="topbar-brand"><div class="bname">Janete's Cleaners</div></div>
    </div>

    <div class="nav">
      <div class="nav-tab active" onclick="switchPage('dashboard')">Office Dashboard</div>
      <div class="nav-tab" onclick="switchPage('portal')">Client Portal View</div>
    </div>

    <main id="dashboard" class="page active">
      <div class="grid-2">
        <div class="card">
          <div class="card-head"><span class="ctitle">Master Client List</span><span id="client-count" style="font-size:11px; font-weight:600"></span></div>
          <div style="padding:10px 16px; border-bottom:1px solid #eee"><input type="text" id="searchInput" placeholder="Search name or address..." oninput="renderTable()" style="width:100%; border:none; outline:none; font-size:13px"></div>
          <div style="overflow-x:auto">
            <table>
              <thead><tr><th>Client Name</th><th>Status</th><th>Contact</th><th>Actions</th></tr></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>
        
        <div class="card">
          <div class="card-head"><span class="ctitle">Add / Edit Client</span></div>
          <div class="card-body" style="padding:16px">
            <input type="hidden" id="editKey">
            <input class="finput" id="f-name" placeholder="Full Name">
            <input class="finput" id="f-phone" placeholder="Phone (e.g. 7815551234)">
            <input class="finput" id="f-email" placeholder="Email Address">
            <textarea class="finput" id="f-address" placeholder="Service Address" style="height:70px"></textarea>
            <button class="btn-main" onclick="submitForm()">Update Database</button>
            <button class="btn-main" onclick="auth.signOut()" style="background:#888; margin-top:10px; font-size:12px">Log Out</button>
          </div>
        </div>
      </div>
    </main>

    <main id="portal" class="page">
      <div style="max-width:500px; margin:0 auto; text-align:center; background:white; padding:40px; border-radius:20px; box-shadow:0 4px 15px rgba(0,0,0,0.05)">
        <h1 style="font-family:'Bebas Neue'; font-size:40px; color:#C41A1A">Hello!</h1>
        <p style="color:#666; margin-bottom:30px">Welcome to your private cleaning portal.</p>
        <div style="background:#F9F9F7; padding:20px; border-radius:15px; margin-bottom:20px">
          <p style="font-weight:700; color:#888; font-size:12px; margin-bottom:5px">UPCOMING SERVICE</p>
          <p style="font-size:24px; color:#1C1C1E">Confirmed for this Week</p>
        </div>
        <p style="font-size:13px; color:#888; margin-bottom:10px">Need to reschedule or ask a question?</p>
        <a href="https://wa.me/17819645682?text=Hi%20Janete!%20I'm%20writing%20from%20the%20Client%20Portal..." class="chat-bubble">
           <span>💬 Chat with Janete</span>
        </a>
      </div>
    </main>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBFBm8_E8BW2yPOLSmTCuD93Yiy3I5_XcY",
  authDomain: "janete-s-cleaners.firebaseapp.com",
  databaseURL: "https://janete-s-cleaners-default-rtdb.firebaseio.com",
  projectId: "janete-s-cleaners",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let clients = {};

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('main-app').classList.remove('hidden');
    db.ref("clients").on('value', snap => {
      clients = snap.val() || {};
      renderTable();
    });
  } else {
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('main-app').classList.add('hidden');
  }
});

function handleLogin() {
  auth.signInWithEmailAndPassword(document.getElementById('login-email').value, document.getElementById('login-pass').value)
    .catch(e => document.getElementById('login-error').textContent = "Invalid Credentials");
}

function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  event.currentTarget.classList.add('active');
}

function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const tb = document.getElementById('tableBody');
  const keys = Object.keys(clients).filter(k => clients[k].name.toLowerCase().includes(q));
  document.getElementById('client-count').textContent = keys.length + " TOTAL";

  tb.innerHTML = keys.map(k => {
    const c = clients[k];
    const statusClass = c.status === 'Paid' ? 'status-paid' : 'status-pending';
    const smsLink = c.phone ? `sms:+1${c.phone.replace(/\D/g,'')}?body=Hi%20${c.name},%20this%20is%20Janete's%20Cleaners%20confirming%20your%20next%20visit.` : '#';
    return `
      <tr>
        <td><strong>${c.name}</strong><br><span style="font-size:10px; color:#888">${c.address || ''}</span></td>
        <td><span class="status-pill ${statusClass}" onclick="toggleStatus('${k}')">${c.status || 'Pending'}</span></td>
        <td style="font-size:11px; color:#666">${c.phone || '---'}<br>${c.email || ''}</td>
        <td class="act-cell">
          <button class="btn-xs btn-rem" onclick="editClient('${k}')">✏️ Edit</button>
          <a href="${smsLink}" class="btn-xs btn-rem" style="background:#E0F1FF; color:#004085">📱 SMS</a>
          <button class="btn-xs btn-bill" onclick="billClient('${k}')">💵 Bill</button>
          <button class="btn-xs btn-skip" onclick="deleteClient('${k}')">🗑</button>
        </td>
      </tr>
    `}).join('');
}

function toggleStatus(k) {
  const newStatus = clients[k].status === 'Paid' ? 'Pending' : 'Paid';
  db.ref('clients/'+k).update({ status: newStatus });
}

function submitForm() {
  const key = document.getElementById('editKey').value;
  const data = {
    name: document.getElementById('f-name').value,
    phone: document.getElementById('f-phone').value,
    email: document.getElementById('f-email').value,
    address: document.getElementById('f-address').value,
    status: key ? (clients[key].status || 'Pending') : 'Pending'
  };
  if(key) db.ref('clients/'+key).update(data); else db.ref('clients').push(data);
  ['editKey','f-name','f-phone','f-email','f-address'].forEach(id => document.getElementById(id).value="");
}

function editClient(k) {
  document.getElementById('editKey').value = k;
  document.getElementById('f-name').value = clients[k].name;
  document.getElementById('f-phone').value = clients[k].phone || '';
  document.getElementById('f-email').value = clients[k].email || '';
  document.getElementById('f-address').value = clients[k].address || '';
}

function deleteClient(k) { if(confirm("Permanently delete?")) db.ref('clients/'+k).remove(); }

function billClient(k) {
  const c = clients[k];
  const html = `<html><body style="font-family:sans-serif; padding:40px; text-align:center;">
    <h1 style="color:#C41A1A; margin-bottom:10px;">JANETE'S CLEANERS</h1>
    <h2 style="font-weight:300; border-bottom:1px solid #eee; padding-bottom:10px;">SERVICE INVOICE</h2>
    <div style="text-align:left; margin:20px 0;">
        <p><strong>Bill To:</strong> ${c.name}</p>
        <p><strong>Service Address:</strong> ${c.address}</p>
    </div>
    <table style="width:100%; border-collapse:collapse; margin-top:30px;">
        <tr style="background:#f9f9f9;"><th style="padding:10px; border:1px solid #eee;">Service Description</th><th style="padding:10px; border:1px solid #eee;">Amount</th></tr>
        <tr><td style="padding:15px; border:1px solid #eee;">Professional House Cleaning</td><td style="padding:15px; border:1px solid #eee;">$________</td></tr>
    </table>
    <p style="margin-top:40px; font-size:14px;">Thank you for your business!</p>
    <button onclick="window.print()" style="margin-top:30px; padding:10px 25px; background:#1C1C1E; color:white; border:none; border-radius:5px; cursor:pointer;">Print or Save as PDF</button>
  </body></html>`;
  const win = window.open('','_blank');
  win.document.write(html);
}
</script>
</body>
</html>
</body>
</html>
